name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimal default permissions — principle of least privilege.
# Elevate per-job only if a specific job ever needs write access.
permissions:
  contents: read

# Cancel in-progress runs on the same branch when a new push arrives,
# except on main where every run must complete (don't cancel deployments).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: CI (typecheck · lint · test · build)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1 (Node 24)

      # ── 2. Node 20 ───────────────────────────────────────────────────────────
      # Installs Node (includes npm and corepack). Cache is handled in steps 4–5.
      - name: Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (Node 24)
        with:
          node-version: "20"

      # ── 3. pnpm via corepack ─────────────────────────────────────────────────
      # corepack ships with Node 16+ and manages package manager versions without
      # requiring a third-party action. Pinning to the exact version used locally
      # (pnpm 11.0.4) ensures the lockfile format is always compatible.
      - name: Enable corepack and install pnpm 11.0.4
        run: |
          corepack enable
          corepack prepare pnpm@11.0.4 --activate

      # ── 4. pnpm store path ───────────────────────────────────────────────────
      # Resolved after pnpm is installed so the path is correct for this OS.
      # Written to GITHUB_OUTPUT so the cache step can reference it by name.
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      # ── 5. pnpm store cache ──────────────────────────────────────────────────
      # Must run AFTER checkout (lockfile present) and AFTER pnpm is installed
      # (store path resolved), but BEFORE install so the cache is warmed in time.
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5 (Node 24)
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # ── 6. Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 7. Type check ────────────────────────────────────────────────────────
      - name: Type check
        run: pnpm typecheck

      # ── 8. Lint ──────────────────────────────────────────────────────────────
      # 6 pre-existing warnings are expected (documented in docs/audit/follow-ups.md).
      # ESLint exits 0 for warnings-only; this step blocks only on errors.
      - name: Lint
        run: pnpm lint

      # ── 9. Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: pnpm test

      # ── 10. Build ────────────────────────────────────────────────────────────
      # REQUIRED: next build regenerates .next/types/ (typed routes). pnpm typecheck
      # alone misses build-time type errors when local generated types are stale.
      # See docs/audit/agent-fix-template.md for the failure mode this catches.
      - name: Build
        run: pnpm build
