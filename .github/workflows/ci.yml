name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimal default permissions — principle of least privilege.
# Elevate per-job if a specific job ever needs write access.
permissions:
  contents: read

# Cancel in-progress runs on the same branch when a new push arrives,
# except on main where every run must complete (don't cancel deployments).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: CI (typecheck · lint · test · build)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── 2. Node 20 ───────────────────────────────────────────────────────────
      # Installs Node (includes npm and corepack). Cache is handled in step 4.
      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"

      # ── 3. pnpm via corepack ─────────────────────────────────────────────────
      # corepack ships with Node 16+ and manages package manager versions without
      # requiring a third-party action. Pinning to the exact version used locally
      # (pnpm 11.0.4) ensures the lockfile format is always compatible.
      - name: Enable corepack and install pnpm 11.0.4
        run: |
          corepack enable
          corepack prepare pnpm@11.0.4 --activate

      # ── 4. pnpm store cache ──────────────────────────────────────────────────
      # Key on pnpm-lock.yaml hash so the cache is invalidated on any dep change.
      # The store path is resolved from the running pnpm binary so it works
      # regardless of OS-specific default store locations.
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── 5. Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 6. Type check ────────────────────────────────────────────────────────
      - name: Type check
        run: pnpm typecheck

      # ── 7. Lint ──────────────────────────────────────────────────────────────
      # 6 pre-existing warnings are expected (documented in docs/audit/follow-ups.md).
      # ESLint exits 0 for warnings-only; this step blocks only on errors.
      - name: Lint
        run: pnpm lint

      # ── 8. Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: pnpm test

      # ── 9. Build ─────────────────────────────────────────────────────────────
      # REQUIRED: next build regenerates .next/types/ (typed routes). pnpm typecheck
      # alone misses build-time type errors when local generated types are stale.
      # See docs/audit/agent-fix-template.md for the failure mode this catches.
      - name: Build
        run: pnpm build
